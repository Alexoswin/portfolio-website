<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="110" y1="90" x2="1490" y2="830" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAFAF9"/>
      <stop offset="1" stop-color="#E2E8F0"/>
    </linearGradient>
    <marker id="arrowGold" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#B45309"/>
    </marker>
    <marker id="arrowIndigo" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#4338CA"/>
    </marker>
  </defs>

  <rect width="1600" height="900" rx="40" fill="url(#bg)"/>

  <text x="120" y="145" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="700">
    RSA Operations in Practice
  </text>
  <text x="120" y="190" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="24">
    The same key pair supports two different directions: encryption for secrecy and signatures for trust.
  </text>

  <rect x="120" y="250" width="630" height="540" rx="32" fill="#FEF3C7" fill-opacity="0.38" stroke="#F59E0B" stroke-width="2"/>
  <rect x="850" y="250" width="630" height="540" rx="32" fill="#E0E7FF" fill-opacity="0.55" stroke="#6366F1" stroke-width="2"/>

  <text x="160" y="308" fill="#92400E" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700">
    RSA Encryption
  </text>
  <text x="160" y="342" fill="#92400E" font-family="Arial, Helvetica, sans-serif" font-size="22">
    Anyone encrypts. Only the private key holder decrypts.
  </text>

  <rect x="165" y="395" width="150" height="105" rx="24" fill="#FFFFFF"/>
  <text x="198" y="440" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">M = 65</text>
  <text x="198" y="470" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">plaintext</text>

  <rect x="350" y="395" width="185" height="105" rx="24" fill="#FDE68A"/>
  <text x="384" y="438" fill="#92400E" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">use public key</text>
  <text x="388" y="470" fill="#92400E" font-family="Arial, Helvetica, sans-serif" font-size="20">(n = 3233, e = 17)</text>

  <rect x="570" y="395" width="135" height="105" rx="24" fill="#FFFFFF"/>
  <text x="594" y="440" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">C = 2790</text>
  <text x="603" y="470" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">ciphertext</text>

  <line x1="315" y1="447" x2="350" y2="447" stroke="#B45309" stroke-width="8" marker-end="url(#arrowGold)"/>
  <line x1="535" y1="447" x2="570" y2="447" stroke="#B45309" stroke-width="8" marker-end="url(#arrowGold)"/>

  <rect x="270" y="585" width="330" height="135" rx="28" fill="#FFFFFF"/>
  <text x="318" y="636" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Decrypt with private key
  </text>
  <text x="308" y="673" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="22">
    M = C^d mod n = 65
  </text>
  <text x="309" y="703" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="20">
    d = 2753 stays secret
  </text>

  <line x1="637" y1="500" x2="637" y2="550" stroke="#B45309" stroke-width="8"/>
  <line x1="637" y1="550" x2="600" y2="550" stroke="#B45309" stroke-width="8"/>
  <line x1="600" y1="550" x2="600" y2="650" stroke="#B45309" stroke-width="8"/>
  <line x1="600" y1="650" x2="600" y2="650" stroke="#B45309" stroke-width="8" marker-end="url(#arrowGold)"/>

  <text x="890" y="308" fill="#3730A3" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700">
    RSA Signatures
  </text>
  <text x="890" y="342" fill="#3730A3" font-family="Arial, Helvetica, sans-serif" font-size="22">
    The private key signs first. The public key verifies later.
  </text>

  <rect x="900" y="395" width="180" height="105" rx="24" fill="#FFFFFF"/>
  <text x="930" y="440" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">hash = 42</text>
  <text x="943" y="470" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">message digest</text>

  <rect x="1110" y="395" width="180" height="105" rx="24" fill="#C7D2FE"/>
  <text x="1140" y="438" fill="#3730A3" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">use private key</text>
  <text x="1145" y="470" fill="#3730A3" font-family="Arial, Helvetica, sans-serif" font-size="20">(d = 2753)</text>

  <rect x="1320" y="395" width="120" height="105" rx="24" fill="#FFFFFF"/>
  <text x="1342" y="440" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">S = 3065</text>
  <text x="1343" y="470" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">signature</text>

  <line x1="1080" y1="447" x2="1110" y2="447" stroke="#4338CA" stroke-width="8" marker-end="url(#arrowIndigo)"/>
  <line x1="1290" y1="447" x2="1320" y2="447" stroke="#4338CA" stroke-width="8" marker-end="url(#arrowIndigo)"/>

  <rect x="1035" y="585" width="330" height="135" rx="28" fill="#FFFFFF"/>
  <text x="1090" y="636" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Verify with public key
  </text>
  <text x="1086" y="673" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="22">
    S^e mod n = 42
  </text>
  <text x="1066" y="703" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="20">
    matches the expected digest
  </text>

  <line x1="1380" y1="500" x2="1380" y2="550" stroke="#4338CA" stroke-width="8"/>
  <line x1="1380" y1="550" x2="1365" y2="550" stroke="#4338CA" stroke-width="8"/>
  <line x1="1365" y1="550" x2="1365" y2="650" stroke="#4338CA" stroke-width="8"/>
  <line x1="1365" y1="650" x2="1365" y2="650" stroke="#4338CA" stroke-width="8" marker-end="url(#arrowIndigo)"/>
</svg>
