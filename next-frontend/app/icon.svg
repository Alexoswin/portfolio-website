<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Favicon version of the brand mark (see components/ui/brand-mark.tsx).
       Fixed colors approximating the dark-theme glow tokens, on a dark tile
       so it reads in any browser chrome. -->
