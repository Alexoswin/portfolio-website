    <linearGradient id="hex" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="slash" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="26" fill="#0b0f1a"/>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M106 60 L83 99.8 L37 99.8 L14 60 L37 20.2 L83 20.2 Z" stroke="url(#hex)" stroke-width="7"/>
    <path d="M47 46 L33 60 L47 74" stroke="#38bdf8" stroke-width="9"/>
